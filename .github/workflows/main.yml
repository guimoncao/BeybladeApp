name: Build APK Blindado

on:
  push:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

env:
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar o código
        uses: actions/checkout@v4

      - name: Instalar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl git unzip xz-utils zip \
            libglu1-mesa libgtk-3-dev libblkid-dev liblzma-dev

      - name: Instalar Flet
        run: |
          python -m pip install --upgrade pip
          pip install "flet"

      - name: Mostrar versão do Flet e Flutter recomendado
        run: |
          python -c "import flet, flet.version; print('Flet:', flet.__version__); print('Flutter recomendado:', flet.version.flutter_version)"

      - name: Build do APK
        run: |
          flet build apk --verbose

      - name: Verificar saída
        run: |
          find build -type f | sort

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: BeybladeApp-APK
          path: build/apk/**/*.apk
