name: Build APK Blindado

on:
  push:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar o código
        uses: actions/checkout@v6

      - name: Instalar Java (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl git unzip xz-utils zip \
            libglu1-mesa libgtk-3-dev libblkid-dev liblzma-dev

      - name: Instalar Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Mostrar versões
        run: |
          python --version
          java -version
          python -c "import flet, flet.version; print('Flet:', flet.__version__); print('Flutter requerido:', flet.version.flutter_version)"

      - name: Build do APK
        run: |
          set -euxo pipefail
          flet build apk --yes --verbose

      - name: Verificar arquivos gerados
        if: always()
        run: |
          find build -type f | sort

      - name: Disponibilizar o APK para Download
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BeybladeApp-APK
          path: build/apk/**/*.apk
