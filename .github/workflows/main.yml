name: Build APK

on:
  push:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch: # Permite rodar o gerador manualmente num botão!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar o código
        uses: actions/checkout@v4

      - name: Instalar Java (Obrigatório para o Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Flet
        run: pip install flet

      - name: Construir o APK
        run: flet build apk --verbose

      - name: Disponibilizar o APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: BeybladeApp-APK
          path: build/apk/**/*.apk
