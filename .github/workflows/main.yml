name: Build APK Blindado

on:
  push:
    branches: [ "main", "master", "principal" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Pegar o código
        uses: actions/checkout@v4

      - name: Instalar Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git unzip xz-utils zip libglu1-mesa libgtk-3-dev libblkid-dev liblzma-dev

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Preparar Flet e Build do APK
        run: |
          pip install flet
          # Cria a estrutura do projeto Flutter a partir do Python
          flet build apk --no-docker --verbose
        
      - name: Verificar se o APK existe
        run: |
          find build/apk -name "*.apk"
          
      - name: Disponibilizar o APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: BeybladeApp-APK
          path: build/apk/**/*.apk
